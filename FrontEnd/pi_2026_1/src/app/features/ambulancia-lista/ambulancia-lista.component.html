<div class="lista-container">
  <div class="header-actions">
    <h2>Lista de Ambulâncias</h2>
    <p-button
      label="Nova Ambulância"
      icon="pi pi-plus"
      (onClick)="novaAmbulancia()" />
  </div>

  <p-confirmDialog></p-confirmDialog>

  <p-table
    #dt
    [value]="ambulancias"
    [paginator]="true"
    [rows]="10"
    [globalFilterFields]="['descricao', 'placa', 'status']"
    styleClass="p-datatable-sm"
    [rowHover]="true">

    <ng-template pTemplate="caption">
      <div class="flex justify-content-end">
        <span class="p-input-icon-left">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            placeholder="Buscar ambulância..." />
        </span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="descricao">Descrição <p-sortIcon field="descricao"></p-sortIcon></th>
        <th pSortableColumn="placa">Placa <p-sortIcon field="placa"></p-sortIcon></th>
        <th pSortableColumn="status">Status <p-sortIcon field="status"></p-sortIcon></th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-amb>
      <tr>
        <td>{{ amb.descricao }}</td>
        <td>{{ amb.placa }}</td>
        <td>
          <span class="status-badge" [ngClass]="amb.status">{{ amb.status | titlecase }}</span>
        </td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-eye" severity="info" [rounded]="true" [text]="true" (onClick)="detalhes(amb.id)"></p-button>
            <p-button icon="pi pi-pencil" severity="warn" [rounded]="true" [text]="true" (onClick)="editar(amb.id)"></p-button>
            <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="confirmarExclusao(amb)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center">Nenhuma ambulância encontrada.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
